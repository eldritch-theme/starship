# A complete powerline-style theme, ported from the Catppuccin/Pastel powerline presets
# Requires a Nerd Font for the segment separators and module icons to render correctly

"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
palette = 'eldritch_cthulhu'

format = """
[¯éÂ](primary)\
$os\
$username\
[¯é░](bg:secondary fg:primary)\
$directory\
[¯é░](bg:tertiary fg:secondary)\
$git_branch\
$git_status\
[¯é░](fg:tertiary bg:quaternary)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:quaternary bg:quinary)\
$conda\
[¯é░](fg:quinary bg:senary)\
$time\
[¯é░ ](fg:senary)\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = false
style = "bg:primary fg:base"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
AOSC = "´îü"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:primary fg:base"
style_root = "bg:primary fg:base"
format = '[ $user]($style)'

[directory]
style = "bg:secondary fg:base"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:tertiary"
format = '[[ $symbol $branch ](fg:base bg:tertiary)]($style)'

[git_status]
style = "bg:tertiary"
format = '[[($all_status$ahead_behind )](fg:base bg:tertiary)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[bun]
symbol = "¯Ø»"
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[java]
symbol = "¯ëû "
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:quaternary"
format = '[[ $symbol( $version) ](fg:base bg:quaternary)]($style)'

[python]
symbol = "¯ÿå"
