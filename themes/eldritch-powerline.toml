[conda]
symbol = " ´äî "
style = "fg:base bg:quinary"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:senary"
format = '[[ ´É║ $time ](fg:base bg:senary)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:primary)'
error_symbol = '[ÔØ»](bold fg:quaternary)'
vimcmd_symbol = '[ÔØ«](bold fg:secondary)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:quaternary)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:quaternary)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:senary)'

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "bg:senary"
disabled = false
show_notifications = true
min_time_to_notify = 45000

